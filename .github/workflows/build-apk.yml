name: Build APK

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install pnpm dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Vue frontend
        working-directory: openclaw-android
        run: pnpm run build:frontend

      - name: Build CLI server
        working-directory: openclaw-android
        run: pnpm run build:cli

      - name: Bundle server into APK assets
        run: |
          set -euo pipefail
          ASSETS_DIR="android/app/src/main/assets/server-bundle"
          echo "Copying built artifacts from openclaw-android into $ASSETS_DIR"
          rm -rf "$ASSETS_DIR"
          mkdir -p "$ASSETS_DIR/dist"
          mkdir -p "$ASSETS_DIR/dist-cli"
          cp -r openclaw-android/dist/ "$ASSETS_DIR/dist/" || true
          cp -r openclaw-android/dist-cli/ "$ASSETS_DIR/dist-cli/" || true
          cp openclaw-android/package.json "$ASSETS_DIR/package.json" || true
          (cd "$ASSETS_DIR" && npm install --omit=dev --ignore-scripts 2>/dev/null || true)

      - name: Download Termux bootstrap
        run: bash android/scripts/download-bootstrap.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/anyclaw.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw
          path: android/app/build/outputs/apk/debug/anyclaw.apk

      - name: Generate changelog
        if: github.ref_type == 'branch'
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --reverse)
          else
            CHANGES=$(git log --pretty=format:"- %s" --reverse -20)
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$CHANGES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: github.ref_type == 'branch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "AnyClaw v${{ github.run_number }} (${{ github.ref_name }})"
          body: |
            🦞 **AnyClaw** — OpenClaw + Codex on Android

            📱 Install the APK on any ARM64 Android 7.0+ device. No root required.

            ### Changes
            ${{ steps.changelog.outputs.notes }}

            ---
            Branch: ${{ github.ref_name }}
            Built from commit ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/anyclaw.apk
          draft: false
          prerelease: false
